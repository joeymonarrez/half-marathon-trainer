<body>
  <h1>Half Marathon Trainer</h1>

  <h2>Log a Run</h2>
  <input type="number" id="distance" placeholder="Distance (miles)" />
  <input type="text" id="time" placeholder="Time (e.g. 25:00)" />
  <button onclick="logRun()">Log Run</button>

  <h2>Run History</h2>
  <ul id="runList"></ul>

  <script>
    function getRuns() {
      return JSON.parse(localStorage.getItem("runs")) || [];
    }

    function saveRuns(runs) {
      localStorage.setItem("runs", JSON.stringify(runs));
    }

    function logRun() {
      const distance = document.getElementById("distance").value;
      const time = document.getElementById("time").value;

      if (!distance || !time) {
        alert("Enter distance and time");
        return;
      }

      const run = {
        date: new Date().toLocaleDateString(),
        distance,
        time
      };

      const runs = getRuns();
      runs.push(run);
      saveRuns(runs);

      displayRuns();
    }

    function displayRuns() {
      const runs = getRuns();
      const list = document.getElementById("runList");
      list.innerHTML = "";

      runs.forEach(run => {
        const li = document.createElement("li");
        li.textContent = `${run.date} - ${run.distance} mi - ${run.time}`;
        list.appendChild(li);
      });
    }

    // Load runs on page load
    displayRuns();
  </script>
</body>
